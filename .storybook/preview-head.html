<!-- Allow YouTube iframes to autoplay inside Storybook's story iframe -->
<meta http-equiv="Content-Security-Policy" content="frame-src https://www.youtube-nocookie.com https://www.youtube.com 'self'">
<meta name="permissions-policy" content="autoplay=*, fullscreen=*">

<!-- Regents University — Webfonts -->

    font-family: 'Magnole';
    src: url('/assets/fonts/Magnole-Regular.woff2') format('woff2');

    src: url('/assets/fonts/Magnole-Italic.woff2') format('woff2');

  }
</style>
